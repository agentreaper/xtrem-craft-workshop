name: PHP Composer

defaults:
  run:
    shell: bash
    working-directory: ./php
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    
    - uses: actions/checkout@v4

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Configure Composer for Infection
      run: composer config --no-plugins allow-plugins.infection/extension-installer true
    
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress 
    
    - name: Run unit tests
      run: php vendor/bin/phpunit --testdox
    
    - name: Install infection dependencies
      run: sudo apt-get update && sudo apt-get install -y php8.2-pcov gnupg
        
    - name: Download and verify Infection PHAR
      run: |
        wget https://github.com/infection/infection/releases/download/0.32.0/infection.phar
        wget https://github.com/infection/infection/releases/download/0.32.0/infection.phar.asc
        gpg --recv-keys C6D76C329EBADE2FB9C458CFC5095986493B4AA0
        gpg --with-fingerprint --verify infection.phar.asc infection.phar
        chmod +x infection.phar
        
    - name: Create minimal Infection configuration
      run: |
        cat > infection.json << 'EOF'
        {
          "ignoreMsiWithNoMutations": true,
          "logs": {
            "text": ".build/infection/infection-log.txt"
          },
          "minCoveredMsi": 48,
          "minMsi": 48,
          "phpUnit": {
            "configDir": "."
          },
          "source": {
            "directories": ["src"]
          },
          "timeout": 10
        }
        EOF
        
    - name: Run infection tests
      run: ./infection.phar --threads=4 --show-mutations --no-progress
      
    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    # - name: Run test suite
    #   run: composer run-script test
